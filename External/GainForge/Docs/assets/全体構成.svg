<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="-apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- 背景（ダークモードでも読めるよう白キャンバスを敷く） -->
  <rect x="0" y="0" width="820" height="470" rx="12" fill="#ffffff"/>

  <!-- ===== 上段：実行可能ターゲット ===== -->
  <!-- CLI ツール -->
  <rect x="120" y="56" width="160" height="62" rx="10" fill="#EAF2FB" stroke="#4A7FB5" stroke-width="2"/>
  <text x="200" y="93" text-anchor="middle" font-size="18" font-weight="600" fill="#1F3A5F">CLI ツール</text>

  <!-- GUI（macOS） -->
  <rect x="320" y="56" width="160" height="62" rx="10" fill="#EAF2FB" stroke="#4A7FB5" stroke-width="2"/>
  <text x="400" y="93" text-anchor="middle" font-size="18" font-weight="600" fill="#1F3A5F">GUI（macOS）</text>

  <!-- 上段の注釈 -->
  <line x1="480" y1="87" x2="520" y2="87" stroke="#999999" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="528" y="92" font-size="14" fill="#555555">実行可能ターゲット（薄いラッパ）</text>

  <!-- ===== 結線（マージ）===== -->
  <line x1="200" y1="118" x2="200" y2="200" stroke="#555555" stroke-width="2"/>
  <line x1="400" y1="118" x2="400" y2="200" stroke="#555555" stroke-width="2"/>
  <line x1="200" y1="200" x2="400" y2="200" stroke="#555555" stroke-width="2"/>
  <line x1="300" y1="200" x2="300" y2="292" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== 下段：GainForgeCore ===== -->
  <rect x="160" y="292" width="280" height="130" rx="12" fill="#FFF3E0" stroke="#E8910C" stroke-width="2.5"/>
  <text x="300" y="328" text-anchor="middle" font-size="20" font-weight="700" fill="#8A4B00">GainForgeCore</text>
  <text x="300" y="360" text-anchor="middle" font-size="15" fill="#5A3A10">・ゲインマップ生転写</text>
  <text x="300" y="384" text-anchor="middle" font-size="15" fill="#5A3A10">・HEIC 書き出し</text>
  <text x="300" y="408" text-anchor="middle" font-size="15" fill="#5A3A10">・品質 / サイズ調整</text>

  <!-- 下段の注釈 -->
  <line x1="440" y1="345" x2="500" y2="345" stroke="#999999" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="508" y="350" font-size="14" fill="#555555">変換ロジック（Swift Package ライブラリ）</text>
</svg>
