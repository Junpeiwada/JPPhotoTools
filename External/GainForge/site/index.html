<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GainForge — HDR ゲインマップを保持したまま HEIC 変換</title>
<meta name="description" content="HDR ゲインマップ付き JPEG を、ゲインマップを保持したまま HEIC に変換する macOS アプリ。写真アプリと同じ HDR 構造で書き出します。">
<meta property="og:title" content="GainForge">
<meta property="og:description" content="HDR ゲインマップを保持したまま JPEG → HEIC 変換する macOS アプリ">
<meta property="og:image" content="https://junpeiwada.github.io/GainForge/screenshot.png">
<link rel="canonical" href="https://junpeiwada.github.io/GainForge/">
<link rel="alternate" hreflang="ja" href="https://junpeiwada.github.io/GainForge/">
<link rel="alternate" hreflang="en" href="https://junpeiwada.github.io/GainForge/">
<link rel="icon" href="icon.png">
<style>
  :root{
    --bg:#0e1014; --panel:#171a21; --line:#262b35;
    --fg:#e8eaed; --muted:#9aa3b2; --accent:#ff8a3d; --accent2:#ffd166;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    line-height:1.7; -webkit-font-smoothing:antialiased;
  }
  a{color:inherit}
  .wrap{max-width:980px;margin:0 auto;padding:0 24px}

  /* Language switcher */
  .lang-bar{position:fixed;top:14px;right:18px;z-index:100;display:flex;gap:6px}
  .lang-btn{
    background:rgba(23,26,33,.82);border:1px solid var(--line);
    color:var(--muted);font-size:13px;font-weight:600;padding:5px 12px;
    border-radius:8px;cursor:pointer;transition:color .12s,border-color .12s;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }
  .lang-btn:hover,.lang-btn.active{color:var(--accent);border-color:var(--accent)}

  /* Hero */
  .hero{text-align:center;padding:84px 24px 48px;
    background:radial-gradient(1200px 500px at 50% -10%, rgba(255,138,61,.18), transparent 60%);}
  .icon{width:120px;height:120px;border-radius:27%;box-shadow:0 18px 50px rgba(0,0,0,.5);}
  h1{font-size:52px;letter-spacing:.5px;margin:22px 0 6px;font-weight:800}
  .tag{font-size:19px;color:var(--muted);max-width:620px;margin:0 auto}

  .cta{display:flex;gap:14px;justify-content:center;align-items:center;flex-wrap:wrap;margin:34px 0 10px}
  .btn{display:inline-flex;align-items:center;gap:10px;padding:15px 28px;border-radius:13px;
    font-size:17px;font-weight:700;text-decoration:none;transition:transform .12s ease,box-shadow .12s ease}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1205;
    box-shadow:0 10px 30px rgba(255,138,61,.35)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(255,138,61,.45)}
  .btn-ghost{border:1px solid var(--line);color:var(--fg)}
  .btn-ghost:hover{border-color:var(--accent)}
  .req{font-size:13.5px;color:var(--muted);margin-top:8px}
  .req b{color:#cdd3dd;font-weight:600}

  /* Shot */
  .shot{margin:40px auto 0;max-width:900px}
  .shot img{width:100%;border-radius:14px;border:1px solid var(--line);box-shadow:0 24px 70px rgba(0,0,0,.55)}

  /* Sections */
  section{padding:64px 0}
  h2{font-size:28px;text-align:center;margin-bottom:8px}
  .sub{text-align:center;color:var(--muted);margin-bottom:36px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px 24px}
  .card h3{font-size:17px;margin-bottom:6px}
  .card p{color:var(--muted);font-size:14.5px}
  .card .em{color:var(--accent2)}

  .center-shot{margin-top:30px}
  .center-shot img{width:100%;border-radius:14px;border:1px solid var(--line)}

  /* Steps */
  .steps{counter-reset:s;max-width:680px;margin:0 auto}
  .step{counter-increment:s;display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--line)}
  .step:last-child{border-bottom:0}
  .step::before{content:counter(s);flex:0 0 34px;height:34px;border-radius:50%;
    background:var(--accent);color:#1a1205;font-weight:800;display:grid;place-items:center}
  .step div b{display:block}
  .step div span{color:var(--muted);font-size:14px}

  footer{border-top:1px solid var(--line);padding:34px 0 60px;text-align:center;color:var(--muted);font-size:14px}
  footer a{color:var(--accent2);text-decoration:none}
  @media(max-width:640px){
    h1{font-size:40px}.grid{grid-template-columns:1fr}.hero{padding-top:60px}
  }
</style>
</head>
<body>

  <nav class="lang-bar">
    <button class="lang-btn" id="btn-ja" onclick="setLang('ja')">日本語</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
  </nav>

  <header class="hero">
    <img class="icon" src="icon.png" alt="GainForge">
    <h1>GainForge</h1>
    <p class="tag"
      data-ja="HDR ゲインマップ付き JPEG を、ゲインマップを保持したまま HEIC に変換する macOS アプリ。写真アプリと同じ HDR 構造で書き出します。"
      data-en="A macOS app that converts HDR gain map JPEGs to HEIC while preserving the gain map — the same HDR structure as Photos.app exports."
    ></p>
    <div class="cta">
      <a id="dl" class="btn btn-primary" href="https://github.com/Junpeiwada/GainForge/releases/latest">
        ⬇︎ <span data-ja="ダウンロード" data-en="Download"></span> <span id="ver"></span>
      </a>
      <a class="btn btn-ghost" href="https://github.com/Junpeiwada/GainForge"
        data-ja="GitHub で見る" data-en="View on GitHub"></a>
    </div>
    <p class="req">
      <b>macOS 15+</b>
      <span data-ja="・ Apple 署名 / 公証済み ・ 無料 ・ 自動更新対応"
            data-en="· Apple-signed & notarized · Free · Auto-update supported"></span>
    </p>
    <div class="shot"><img src="screenshot.png"
      data-alt-ja="GainForge アプリ画面"
      data-alt-en="GainForge app screenshot"></div>
  </header>

  <section>
    <div class="wrap">
      <h2 data-ja="特長" data-en="Features"></h2>
      <p class="sub"
        data-ja="写真アプリ書き出しと画素レベルでほぼ一致する HDR 変換"
        data-en="Pixel-accurate HDR conversion, matching Photos.app exports"
      ></p>
      <div class="grid">
        <div class="card">
          <h3 data-ja="ゲインマップを<span class='em'>生転写</span>"
              data-en="<span class='em'>Lossless</span> Gain Map Transfer"></h3>
          <p data-ja="元のカラーゲインマップを Display P3 PQ のまま転写。SDR ベース画像 + ISO ゲインマップで、写真アプリと同じ HDR 構造を保ちます。"
             data-en="Transfers the original color gain map as-is in Display P3 PQ. Outputs an SDR base image + ISO gain map — the same HDR structure as Photos.app."></p>
        </div>
        <div class="card">
          <h3 data-ja="一括変換" data-en="Batch Conversion"></h3>
          <p data-ja="JPEG / フォルダをドラッグ&ドロップ。コア数に応じて複数枚を並列変換し、1 件ごとに結果をライブ更新します。"
             data-en="Drag and drop JPEGs or folders. Converts multiple files in parallel based on CPU cores, updating results live per file."></p>
        </div>
        <div class="card">
          <h3 data-ja="比較ビューワ内蔵" data-en="Built-in Comparison Viewer"></h3>
          <p data-ja="変換前後を並べて、HDR 表示のまま画質を確認できます。"
             data-en="Side-by-side before/after comparison with full HDR display."></p>
        </div>
        <div class="card">
          <h3 data-ja="メタデータ保持" data-en="Metadata Preserved"></h3>
          <p data-ja="EXIF / GPS / 向き（Orientation）などの撮影情報を引き継いで書き出します。"
             data-en="Retains EXIF, GPS, orientation, and other shooting metadata in the output."></p>
        </div>
      </div>
      <div class="center-shot"><img src="viewer.png"
        data-alt-ja="比較ビューワ"
        data-alt-en="Comparison viewer"></div>
    </div>
  </section>

  <section style="padding-top:0">
    <div class="wrap">
      <h2 data-ja="インストール" data-en="Installation"></h2>
      <p class="sub"
        data-ja="ダウンロードして「アプリケーション」に入れるだけ"
        data-en="Download and drop into Applications — that's it"
      ></p>
      <div class="steps">
        <div class="step"><div>
          <b data-ja="ダウンロード" data-en="Download"></b>
          <span data-ja="上の「ダウンロード」ボタンから zip を入手します。"
                data-en="Click the Download button above to get the zip file."></span>
        </div></div>
        <div class="step"><div>
          <b data-ja="展開" data-en="Unzip"></b>
          <span data-ja="zip をダブルクリックすると <code>GainForge.app</code> ができます。"
                data-en="Double-click the zip to extract <code>GainForge.app</code>."></span>
        </div></div>
        <div class="step"><div>
          <b data-ja="移動" data-en="Move"></b>
          <span data-ja="<code>GainForge.app</code> を「アプリケーション」フォルダにドラッグします。"
                data-en="Drag <code>GainForge.app</code> to your Applications folder."></span>
        </div></div>
        <div class="step"><div>
          <b data-ja="起動" data-en="Launch"></b>
          <span data-ja="ダブルクリックで起動。初回に確認が出たら「開く」を押してください（公証済みのため警告ブロックは出ません）。"
                data-en="Double-click to launch. If a dialog appears the first time, click Open. (The app is notarized by Apple — no security warning.)"></span>
        </div></div>
      </div>
    </div>
  </section>

  <footer>
    <p>© Junpei Wada ·
      <a href="https://github.com/Junpeiwada/GainForge">GitHub</a> ·
      <a href="https://github.com/Junpeiwada/GainForge/releases"
        data-ja="リリース一覧" data-en="All releases"></a>
    </p>
    <p style="margin-top:6px"
      data-ja="アプリ内の「GainForge について」から自動更新を確認できます。"
      data-en="Check for updates in the app via GainForge → About GainForge."></p>
  </footer>

  <script>
    var REPO = 'Junpeiwada/GainForge';

    // ── i18n ──────────────────────────────────────────────────────────────
    var STORAGE_KEY = 'gainforge-lang';

    function detectLang() {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved === 'ja' || saved === 'en') return saved;
      var nav = navigator.language || navigator.userLanguage || '';
      return nav.toLowerCase().startsWith('ja') ? 'ja' : 'en';
    }

    function applyLang(lang) {
      document.documentElement.lang = lang;
      localStorage.setItem(STORAGE_KEY, lang);

      // text / innerHTML nodes
      document.querySelectorAll('[data-ja][data-en]').forEach(function(el) {
        el.innerHTML = el.getAttribute('data-' + lang);
      });

      // img alt
      document.querySelectorAll('[data-alt-ja][data-alt-en]').forEach(function(el) {
        el.alt = el.getAttribute('data-alt-' + lang);
      });

      // page title & meta description
      if (lang === 'en') {
        document.title = 'GainForge — Convert JPEG with HDR Gain Map to HEIC';
        var m = document.querySelector('meta[name="description"]');
        if (m) m.content = 'A free macOS app that converts HDR gain map JPEGs to HEIC while preserving the gain map. Same HDR structure as Photos.app.';
      } else {
        document.title = 'GainForge — HDR ゲインマップを保持したまま HEIC 変換';
        var m = document.querySelector('meta[name="description"]');
        if (m) m.content = 'HDR ゲインマップ付き JPEG を、ゲインマップを保持したまま HEIC に変換する macOS アプリ。写真アプリと同じ HDR 構造で書き出します。';
      }

      // active button style
      document.getElementById('btn-ja').classList.toggle('active', lang === 'ja');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    }

    function setLang(lang) {
      applyLang(lang);
    }

    applyLang(detectLang());

    // ── GitHub release ────────────────────────────────────────────────────
    fetch('https://api.github.com/repos/' + REPO + '/releases/latest')
      .then(function(r) { if (!r.ok) throw 0; return r.json(); })
      .then(function(d) {
        var zip = (d.assets || []).find(function(a) { return /\.zip$/.test(a.name); });
        if (zip) { document.getElementById('dl').href = zip.browser_download_url; }
        var v = document.getElementById('ver');
        if (v && d.tag_name) { v.textContent = d.tag_name; }
      })
      .catch(function() { /* フォールバック: releases/latest のまま */ });
  </script>

</body>
</html>
