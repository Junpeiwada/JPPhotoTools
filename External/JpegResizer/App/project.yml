name: JpegResizer
options:
  bundleIdPrefix: com.junpeiwada
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  # 同一リポジトリ内の Swift Package（Core）をローカル参照する。
  JpegResizer:
    path: ..

targets:
  JpegResizer:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: JpegResizer
        product: JpegResizerCore
    info:
      path: JpegResizer-Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.photography
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.junpeiwada.JpegResizer
        PRODUCT_NAME: JpegResizer
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        # ローカルツールのため App Sandbox は無効（入力隣への .jpg 書き出しを許可）。
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets:
        - JpegResizerAppTests

  JpegResizerAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: JpegResizer
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.junpeiwada.JpegResizer.tests
