name: JPPhotoTools
options:
  bundleIdPrefix: com.junpeiwada
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  # 各機能の「App 層」を独立ライブラリ化して依存する。GainForgeApp / JpegResizerApp は
  # それぞれ内部で GainForgeCore / JpegResizerCore（External にコピー同梱）を path 参照で
  # リンクするため、統合アプリからは App 層モジュールだけを見ればよい。型名（AppViewModel /
  # FileItem 等）が両者で同名衝突するのを、モジュール境界で名前空間を分けて解消している。
  # GainForgeCore の ML-LUT は Bundle.module 経由で解決され、パッケージ参照のまま保たれる。
  GainForgeApp:
    path: ../Packages/GainForgeApp
  JpegResizerApp:
    path: ../Packages/JpegResizerApp
  # RAW-Trash は仕分け系でパイプラインが変換系2つと異なるため、共通シェルに乗せず
  # 統合アプリ内の専用タブ（RawTrashTab）が Core を直接使う。
  RawTrashCore:
    path: ../Packages/RawTrashCore
  # GeoTagger も RAW-Trash と同様、GPX・地図・マッチングを持つ独自パイプラインのため
  # 共通シェルに乗せず、統合アプリ内の専用タブ（GeoTaggerTab）が Core を直接使う。
  GeoTaggerCore:
    path: ../Packages/GeoTaggerCore
  # アプリ内自動更新フレームワーク。GitHub Pages の appcast を参照して更新する。
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.3"

targets:
  JPPhotoTools:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: GainForgeApp
        product: GainForgeApp
      - package: JpegResizerApp
        product: JpegResizerApp
      - package: RawTrashCore
        product: RawTrashCore
      - package: GeoTaggerCore
        product: GeoTaggerCore
      - package: Sparkle
        product: Sparkle
    # Sparkle の任意キー（SUFeedURL/SUPublicEDKey）は INFOPLIST_KEY_* では注入できないため、
    # 実 Info.plist を XcodeGen で生成する。設定変更時は project.yml を編集して再生成すること。
    info:
      path: JPPhotoTools-Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.photography
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: ""
        # Sparkle: 更新フィード（GitHub Pages でホストする appcast）
        SUFeedURL: "https://junpeiwada.github.io/JPPhotoTools/appcast.xml"
        # Sparkle: appcast 署名検証用の EdDSA 公開鍵。
        # `generate_keys` で生成した公開鍵に置き換える（公開鍵なのでリポジトリに含めてよい）。
        # 対応する秘密鍵はキーチェーンに保存され、CI 署名用に Secret SPARKLE_PRIVATE_KEY へ登録する。
        SUPublicEDKey: "WiyUPbS5LnynuM2+J8Z/n+nRIhbjDpwtD/rbmcWeGVg="
        # 起動時に自動で更新確認（既定 ON、間隔 24h）。ユーザーは About 画面で切替可能。
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.junpeiwada.JPPhotoTools
        PRODUCT_NAME: JPPhotoTools
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # ローカルツールのため App Sandbox は無効（入力隣への書き出しを許可）。
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
